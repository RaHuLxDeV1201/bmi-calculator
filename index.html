<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- Favicon pointing exactly to your custom public asset folder -->
    <link rel="icon" type="image/svg+xml" href="./public/Logo.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist BMI Calculator</title>
    <!-- Tailwind CSS Engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <style>
        .transition-all { transition-property: all; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 200ms; }
        
        /* Error Shake Micro-Interaction */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .animate-shake {
            animation: shake 0.3s ease-in-out;
        }
    </style>
</head>

<body class="bg-slate-50 dark:bg-slate-900 min-h-screen flex items-center justify-center p-4 transition-colors duration-300">

    <main class="relative bg-white dark:bg-slate-800 w-full max-w-md rounded-2xl shadow-xl border border-slate-100 dark:border-slate-700 p-6 sm:p-8 transition-all duration-300">

        <!-- Theme Toggle Button -->
        <button id="darkModeToggle" type="button" aria-label="Toggle theme"
            class="absolute top-6 right-6 p-2 rounded-xl bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300 transition-colors duration-200 focus:outline-none">
            <svg id="moonIcon" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
            </svg>
            <svg id="sunIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.243 17.657l.707.707M6.343 6.343l.707-.707M14.25 12a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"></path>
            </svg>
        </button>

        <header class="text-center mb-6">
            <img src="./public/Logo.svg" alt="App Logo" class="w-16 h-16 mx-auto mb-2 object-contain rounded-xl">
            <h1 class="text-2xl font-bold text-slate-800 dark:text-white tracking-tight">BMI Calculator</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Calculate your Body Mass Index instantly</p>
        </header>

        <form id="bmiForm" class="space-y-6" novalidate>

            <!-- Unit Selection Bar -->
            <div class="flex bg-slate-100 dark:bg-slate-700/60 p-1 rounded-xl border border-slate-200/40 dark:border-slate-600/30">
                <button id="metricToggleBtn" type="button"
                    class="flex-1 text-center py-2 text-xs sm:text-sm font-bold rounded-lg bg-white dark:bg-slate-600 shadow-sm text-slate-800 dark:text-white transition-all duration-200">
                    Metric (cm/kg)
                </button>
                <button id="imperialToggleBtn" type="button"
                    class="flex-1 text-center py-2 text-xs sm:text-sm font-bold rounded-lg text-slate-400 dark:text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-all duration-200">
                    Imperial (ft/lbs)
                </button>
            </div>

            <!-- METRIC FIELDS -->
            <div id="metricFields" class="space-y-6">
                <div>
                    <label for="height" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Height (cm)</label>
                    <input type="number" id="height" placeholder="e.g., 175"
                        class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-600 rounded-xl focus:outline-none focus:ring-2 text-slate-800 dark:text-white font-medium transition-all">
                    <p id="heightError" class="text-xs text-rose-500 font-medium mt-1.5 hidden"></p>
                </div>

                <div>
                    <label for="weight" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Weight (kg)</label>
                    <input type="number" id="weight" placeholder="e.g., 70"
                        class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-600 rounded-xl focus:outline-none focus:ring-2 text-slate-800 dark:text-white font-medium transition-all">
                    <p id="weightError" class="text-xs text-rose-500 font-medium mt-1.5 hidden"></p>
                </div>
            </div>

            <!-- IMPERIAL FIELDS -->
            <div id="imperialFields" class="space-y-6 hidden">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Height</label>
                    <div class="flex gap-3">
                        <div class="flex-1">
                            <input type="number" id="heightFt" placeholder="Feet"
                                class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-600 rounded-xl focus:outline-none focus:ring-2 text-slate-800 dark:text-white font-medium transition-all">
                        </div>
                        <div class="flex-1">
                            <input type="number" id="heightIn" placeholder="Inches"
                                class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-600 rounded-xl focus:outline-none focus:ring-2 text-slate-800 dark:text-white font-medium transition-all">
                        </div>
                    </div>
                    <p id="imperialHeightError" class="text-xs text-rose-500 font-medium mt-1.5 hidden"></p>
                </div>

                <div>
                    <label for="weightLbs" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Weight (lbs)</label>
                    <input type="number" id="weightLbs" placeholder="e.g., 150"
                        class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-600 rounded-xl focus:outline-none focus:ring-2 text-slate-800 dark:text-white font-medium transition-all">
                    <p id="weightLbsError" class="text-xs text-rose-500 font-medium mt-1.5 hidden"></p>
                </div>
            </div>

            <!-- Controls -->
            <div class="flex flex-col sm:flex-row gap-3 pt-2">
                <button type="submit"
                    class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 px-6 rounded-xl transition-colors duration-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                    Calculate BMI
                </button>
                <button type="button" id="resetBtn"
                    class="bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300 font-semibold py-3 px-6 rounded-xl transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-slate-500">
                    Reset
                </button>
            </div>
        </form>

        <!-- Result Card -->
        <section id="resultCard" aria-live="polite" class="mt-8 p-5 rounded-xl text-center transition-all bg-emerald-50 dark:bg-emerald-950/40 border border-emerald-100 dark:border-emerald-900 text-emerald-900 dark:text-emerald-300">
            <h2 class="text-xs uppercase tracking-wider font-bold opacity-75">Your Score</h2>
            <div id="bmiValue" class="text-4xl font-black my-1">--.--</div>
            <p id="bmiCategory" class="text-base font-bold uppercase tracking-wide mt-1 text-emerald-500 dark:text-emerald-400">Ready to Calculate</p>

            <p id="healthyInsight"
                class="text-xs sm:text-sm mt-3 font-medium opacity-85 leading-relaxed border-t border-black/5 dark:border-white/10 pt-3">
                Enter your metrics above to discover your Body Mass Index.
            </p>

            <div class="mt-6 relative pt-4">
                <div class="h-3 w-full rounded-full flex overflow-hidden bg-slate-100 dark:bg-slate-900">
                    <div class="w-1/4 bg-sky-400" title="Underweight"></div>
                    <div class="w-1/4 bg-emerald-500" title="Normal"></div>
                    <div class="w-1/4 bg-amber-500" title="Overweight"></div>
                    <div class="w-1/4 bg-rose-500" title="Obese"></div>
                </div>
                <div id="bmiPointer"
                    class="absolute top-2.5 -ml-2 w-4 h-4 bg-slate-800 dark:bg-white border-2 border-white dark:border-slate-800 rounded-full shadow-md transition-all duration-500 ease-out"
                    style="left: 0%;"></div>
                <div class="flex justify-between text-[10px] font-bold text-slate-400 dark:text-slate-500 mt-1.5 px-1">
                    <span>15</span><span>18.5</span><span>25</span><span>30</span><span>40+</span>
                </div>
            </div>
        </section>

        <!-- History Section -->
        <section class="mt-6 pt-4 border-t border-slate-100 dark:border-slate-700/60">
            <button id="historyToggleBtn" type="button"
                class="w-full flex items-center justify-between py-2 text-sm font-semibold text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 transition-colors focus:outline-none">
                <span class="flex items-center gap-2">
                    <svg class="w-4 h-4 min-w-[16px] min-h-[16px]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    View Recent History
                </span>
                <svg id="historyChevron" class="w-4 h-4 min-w-[16px] min-h-[16px] transform transition-transform duration-200" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path>
                </svg>
            </button>

            <div id="historyContent" class="hidden mt-3 space-y-2 max-h-48 overflow-y-auto pr-1">
                <div id="historyList" class="space-y-2"></div>
                <button id="clearHistoryBtn" type="button" class="w-full text-center text-xs font-semibold text-rose-500 hover:text-rose-600 dark:hover:text-rose-400 py-1.5 transition-colors hidden">
                    Clear History Log
                </button>
            </div>
        </section>
    </main>

    <!-- App Engine JavaScript Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let currentUnit = 'metric';
            let historyLog = JSON.parse(localStorage.getItem('bmi_history')) || [];

            const htmlEl = document.documentElement;
            const darkModeToggle = document.getElementById('darkModeToggle');
            const sunIcon = document.getElementById('sunIcon');
            const moonIcon = document.getElementById('moonIcon');
            const metricToggleBtn = document.getElementById('metricToggleBtn');
            const imperialToggleBtn = document.getElementById('imperialToggleBtn');
            const metricFields = document.getElementById('metricFields');
            const imperialFields = document.getElementById('imperialFields');
            const bmiForm = document.getElementById('bmiForm');
            const resetBtn = document.getElementById('resetBtn');
            const resultCard = document.getElementById('resultCard');
            const bmiValueDisplay = document.getElementById('bmiValue');
            const bmiCategoryDisplay = document.getElementById('bmiCategory');
            const healthyInsight = document.getElementById('healthyInsight');
            const bmiPointer = document.getElementById('bmiPointer');
            const historyToggleBtn = document.getElementById('historyToggleBtn');
            const historyChevron = document.getElementById('historyChevron');
            const historyContent = document.getElementById('historyContent');
            const historyList = document.getElementById('historyList');
            const clearHistoryBtn = document.getElementById('clearHistoryBtn');

            // Dark Mode Setup
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                htmlEl.classList.add('dark');
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            }

            darkModeToggle.addEventListener('click', () => {
                if (htmlEl.classList.contains('dark')) {
                    htmlEl.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                    sunIcon.classList.add('hidden');
                    moonIcon.classList.remove('hidden');
                } else {
                    htmlEl.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                    sunIcon.classList.remove('hidden');
                    moonIcon.classList.add('hidden');
                }
            });

            // Unit Switching Toggle
            const setUnitSystem = (system) => {
                currentUnit = system;
                clearValidationErrors();
                checkAndHandleEmptyData();
                if (system === 'metric') {
                    metricToggleBtn.className = "flex-1 text-center py-2 text-xs sm:text-sm font-bold rounded-lg bg-white dark:bg-slate-600 shadow-sm text-slate-800 dark:text-white transition-all duration-200";
                    imperialToggleBtn.className = "flex-1 text-center py-2 text-xs sm:text-sm font-bold rounded-lg text-slate-400 dark:text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-all duration-200";
                    metricFields.classList.remove('hidden');
                    imperialFields.classList.add('hidden');
                } else {
                    imperialToggleBtn.className = "flex-1 text-center py-2 text-xs sm:text-sm font-bold rounded-lg bg-white dark:bg-slate-600 shadow-sm text-slate-800 dark:text-white transition-all duration-200";
                    metricToggleBtn.className = "flex-1 text-center py-2 text-xs sm:text-sm font-bold rounded-lg text-slate-400 dark:text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-all duration-200";
                    imperialFields.classList.remove('hidden');
                    metricFields.classList.add('hidden');
                }
            };

            metricToggleBtn.addEventListener('click', () => setUnitSystem('metric'));
            imperialToggleBtn.addEventListener('click', () => setUnitSystem('imperial'));

            // Reset Result Box to Safe Green Layout Configuration
            const resetResultToGreenBox = () => {
                resultCard.className = "mt-8 p-5 rounded-xl text-center transition-all bg-emerald-50 dark:bg-emerald-950/40 border border-emerald-100 dark:border-emerald-900 text-emerald-900 dark:text-emerald-300";
                bmiValueDisplay.innerText = "--.--";
                bmiCategoryDisplay.innerText = "Ready to Calculate";
                bmiCategoryDisplay.className = "text-base font-bold uppercase tracking-wide mt-1 text-emerald-500 dark:text-emerald-400";
                healthyInsight.innerText = "Enter your metrics above to discover your Body Mass Index.";
                bmiPointer.style.left = '0%';
            };

            // Dynamic Styling Framework - guarantees 100% color separation (No mix of colors)
            const applyInputStyle = (inputEl, state) => {
                inputEl.classList.remove(
                    'border-slate-200', 'dark:border-slate-600',
                    'border-emerald-500', 'dark:border-emerald-500', 'focus:border-emerald-500', 'focus:ring-emerald-500',
                    'border-rose-500', 'dark:border-rose-500', 'focus:border-rose-500', 'focus:ring-rose-500'
                );

                if (state === 'invalid') {
                    inputEl.classList.add('border-rose-500', 'dark:border-rose-500', 'focus:border-rose-500', 'focus:ring-rose-500');
                } else if (state === 'valid') {
                    inputEl.classList.add('border-emerald-500', 'dark:border-emerald-500', 'focus:border-emerald-500', 'focus:ring-emerald-500');
                } else {
                    inputEl.classList.add('border-slate-200', 'dark:border-slate-600', 'focus:border-emerald-500', 'focus:ring-emerald-500');
                }
            };

            // Monitors and updates UI when fields are completely empty
            const checkAndHandleEmptyData = () => {
                const height = document.getElementById('height').value;
                const weight = document.getElementById('weight').value;
                const heightFt = document.getElementById('heightFt').value;
                const heightIn = document.getElementById('heightIn').value;
                const weightLbs = document.getElementById('weightLbs').value;

                if (currentUnit === 'metric' && !height && !weight) {
                    resetResultToGreenBox();
                } else if (currentUnit === 'imperial' && !heightFt && !heightIn && !weightLbs) {
                    resetResultToGreenBox();
                }
            };

            // Realtime monitor evaluates user numbers and forces precise coloration context
            document.getElementById('height').addEventListener('input', function() {
                const val = this.value.trim();
                if (val === '') {
                    applyInputStyle(this, 'default');
                    document.getElementById('heightError').classList.add('hidden');
                } else {
                    const num = parseFloat(val);
                    if (num > 0 && num <= 300) {
                        applyInputStyle(this, 'valid');
                        document.getElementById('heightError').classList.add('hidden');
                    } else {
                        applyInputStyle(this, 'invalid');
                        document.getElementById('heightError').innerText = 'Please enter a valid height (1-300 cm).';
                        document.getElementById('heightError').classList.remove('hidden');
                    }
                }
                checkAndHandleEmptyData();
            });

            document.getElementById('weight').addEventListener('input', function() {
                const val = this.value.trim();
                if (val === '') {
                    applyInputStyle(this, 'default');
                    document.getElementById('weightError').classList.add('hidden');
                } else {
                    const num = parseFloat(val);
                    if (num > 0 && num <= 600) {
                        applyInputStyle(this, 'valid');
                        document.getElementById('weightError').classList.add('hidden');
                    } else {
                        applyInputStyle(this, 'invalid');
                        document.getElementById('weightError').innerText = 'Please enter a valid weight (1-600 kg).';
                        document.getElementById('weightError').classList.remove('hidden');
                    }
                }
                checkAndHandleEmptyData();
            });

            document.getElementById('weightLbs').addEventListener('input', function() {
                const val = this.value.trim();
                if (val === '') {
                    applyInputStyle(this, 'default');
                    document.getElementById('weightLbsError').classList.add('hidden');
                } else {
                    const num = parseFloat(val);
                    if (num > 0 && num <= 1300) {
                        applyInputStyle(this, 'valid');
                        document.getElementById('weightLbsError').classList.add('hidden');
                    } else {
                        applyInputStyle(this, 'invalid');
                        document.getElementById('weightLbsError').innerText = 'Please enter a valid weight (1-1300 lbs).';
                        document.getElementById('weightLbsError').classList.remove('hidden');
                    }
                }
                checkAndHandleEmptyData();
            });

            const handleImperialHeightChange = () => {
                const ftEl = document.getElementById('heightFt');
                const inEl = document.getElementById('heightIn');
                const errorEl = document.getElementById('imperialHeightError');
                
                const ftVal = ftEl.value.trim();
                const inVal = inEl.value.trim();
                
                if (ftVal === '' && inVal === '') {
                    applyInputStyle(ftEl, 'default');
                    applyInputStyle(inEl, 'default');
                    errorEl.classList.add('hidden');
                } else {
                    const ft = parseFloat(ftVal) || 0;
                    const inch = parseFloat(inVal) || 0;
                    const totalInches = (ft * 12) + inch;
                    
                    if (totalInches > 0 && totalInches <= 120 && ft >= 0 && inch >= 0) {
                        applyInputStyle(ftEl, 'valid');
                        applyInputStyle(inEl, 'valid');
                        errorEl.classList.add('hidden');
                    } else {
                        applyInputStyle(ftEl, (ftVal !== '' && (ft < 0 || totalInches > 120 || totalInches <= 0)) ? 'invalid' : 'default');
                        applyInputStyle(inEl, (inVal !== '' && (inch < 0 || totalInches > 120 || totalInches <= 0)) ? 'invalid' : 'default');
                        
                        if (totalInches <= 0 || totalInches > 120 || ft < 0 || inch < 0) {
                            if (ftVal !== '') applyInputStyle(ftEl, 'invalid');
                            if (inVal !== '') applyInputStyle(inEl, 'invalid');
                            errorEl.innerText = 'Please enter a valid height layout.';
                            errorEl.classList.remove('hidden');
                        }
                    }
                }
                checkAndHandleEmptyData();
            };

            document.getElementById('heightFt').addEventListener('input', handleImperialHeightChange);
            document.getElementById('heightIn').addEventListener('input', handleImperialHeightChange);

            // Setup Base Standard Form Styles upon setup initialization
            ['height', 'weight', 'heightFt', 'heightIn', 'weightLbs'].forEach(id => {
                const el = document.getElementById(id);
                if(el) applyInputStyle(el, 'default');
            });

            const showError = (errorElementId, inputElementIds, message) => {
                const errElement = document.getElementById(errorElementId);
                if (errElement) {
                    errElement.innerText = message;
                    errElement.classList.remove('hidden');
                }

                const targetIds = Array.isArray(inputElementIds) ? inputElementIds : [inputElementIds];
                
                targetIds.forEach(id => {
                    const inputEl = document.getElementById(id);
                    if (inputEl) {
                        inputEl.classList.remove('animate-shake');
                        void inputEl.offsetWidth; 
                        inputEl.classList.add('animate-shake');
                        applyInputStyle(inputEl, 'invalid');
                    }
                });
            };

            const clearValidationErrors = () => {
                ['heightError', 'weightError', 'imperialHeightError', 'weightLbsError'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.classList.add('hidden');
                });

                ['height', 'weight', 'heightFt', 'heightIn', 'weightLbs'].forEach(id => {
                    const inputEl = document.getElementById(id);
                    if (inputEl) {
                        inputEl.classList.remove('animate-shake');
                        // Retain logic colors if value exists
                        if (inputEl.value.trim() === '') {
                            applyInputStyle(inputEl, 'default');
                        }
                    }
                });
            };

            // Calculate Logic
            bmiForm.addEventListener('submit', (e) => {
                e.preventDefault();
                let isValid = true;
                let bmi = 0;

                if (currentUnit === 'metric') {
                    const heightCm = parseFloat(document.getElementById('height').value);
                    const weightKg = parseFloat(document.getElementById('weight').value);

                    if (!heightCm || heightCm <= 0 || heightCm > 300) {
                        showError('heightError', 'height', 'Please enter a valid height (1-300 cm).');
                        isValid = false;
                    }
                    if (!weightKg || weightKg <= 0 || weightKg > 600) {
                        showError('weightError', 'weight', 'Please enter a valid weight (1-600 kg).');
                        isValid = false;
                    }
                    if (isValid) {
                        bmi = weightKg / ((heightCm / 100) ** 2);
                    }
                } else {
                    const ft = parseFloat(document.getElementById('heightFt').value) || 0;
                    const inch = parseFloat(document.getElementById('heightIn').value) || 0;
                    const weightLbs = parseFloat(document.getElementById('weightLbs').value);
                    const totalInches = (ft * 12) + inch;

                    if (totalInches <= 0 || totalInches > 120) {
                        showError('imperialHeightError', ['heightFt', 'heightIn'], 'Please enter a valid height layout.');
                        isValid = false;
                    }
                    if (!weightLbs || weightLbs <= 0 || weightLbs > 1300) {
                        showError('weightLbsError', 'weightLbs', 'Please enter a valid weight.');
                        isValid = false;
                    }
                    if (isValid) {
                        bmi = (weightLbs * 703) / (totalInches ** 2);
                    }
                }

                if (isValid) {
                    clearValidationErrors();
                    displayBmiResult(bmi);
                }
            });

            const displayBmiResult = (bmi) => {
                const finalBmi = parseFloat(bmi.toFixed(1));
                bmiValueDisplay.innerText = finalBmi.toFixed(1);
                
                let category = '';
                let advice = '';
                let themeClasses = '';
                let textClass = '';

                if (finalBmi < 18.5) {
                    category = 'Underweight';
                    advice = 'Prioritize nutrient-dense profiles and strength training targets.';
                    themeClasses = 'bg-sky-50 dark:bg-sky-950/40 border border-sky-100 dark:border-sky-900 text-sky-900 dark:text-sky-300';
                    textClass = 'text-sky-500 dark:text-sky-400';
                } else if (finalBmi >= 18.5 && finalBmi < 25) {
                    category = 'Normal Weight';
                    advice = 'Healthy balance achieved! Maintain your dynamic daily activity routines.';
                    themeClasses = 'bg-emerald-50 dark:bg-emerald-950/40 border border-emerald-100 dark:border-emerald-900 text-emerald-900 dark:text-emerald-300';
                    textClass = 'text-emerald-500 dark:text-emerald-400';
                } else if (finalBmi >= 25 && finalBmi < 30) {
                    category = 'Overweight';
                    advice = 'Focus on balancing baseline caloric metrics and metabolic cardio exercises.';
                    themeClasses = 'bg-amber-50 dark:bg-amber-950/40 border border-amber-100 dark:border-amber-900 text-amber-900 dark:text-amber-300';
                    textClass = 'text-amber-500 dark:text-amber-400';
                } else {
                    category = 'Obese';
                    advice = 'Consider minor strategic health adjustments or clinical collaboration with specialists.';
                    themeClasses = 'bg-rose-50 dark:bg-rose-950/40 border border-rose-100 dark:border-rose-900 text-rose-900 dark:text-rose-300';
                    textClass = 'text-rose-500 dark:text-rose-400';
                }

                resultCard.className = `mt-8 p-5 rounded-xl text-center transition-all ${themeClasses}`;
                bmiCategoryDisplay.innerText = category;
                bmiCategoryDisplay.className = `text-base font-bold uppercase tracking-wide mt-1 ${textClass}`;
                healthyInsight.innerText = advice;

                let pointerPct = ((finalBmi - 15) / (40 - 15)) * 100;
                bmiPointer.style.left = `${Math.min(Math.max(pointerPct, 0), 100)}%`;

                saveToHistory(finalBmi, category);
            };

            // History Log Module
            const saveToHistory = (bmi, category) => {
                const logEntry = {
                    id: Date.now(),
                    bmi: bmi,
                    category: category,
                    date: new Date().toLocaleDateString(undefined, { month: 'short', day: 'numeric' })
                };
                historyLog.unshift(logEntry);
                if (historyLog.length > 5) historyLog.pop();
                localStorage.setItem('bmi_history', JSON.stringify(historyLog));
                renderHistoryLog();
            };

            const renderHistoryLog = () => {
                historyList.innerHTML = '';
                if (historyLog.length === 0) {
                    historyList.innerHTML = `<p class="text-xs text-slate-400 dark:text-slate-500 text-center py-2">No calculations recorded yet.</p>`;
                    clearHistoryBtn.classList.add('hidden');
                    return;
                }

                historyLog.forEach(item => {
                    let badgeColor = 'bg-slate-100 text-slate-700 dark:bg-slate-700 dark:text-slate-300';
                    if (item.category.includes('Underweight')) badgeColor = 'bg-sky-100 text-sky-800 dark:bg-sky-900/50 dark:text-sky-300';
                    if (item.category.includes('Normal')) badgeColor = 'bg-emerald-100 text-emerald-800 dark:bg-emerald-900/50 dark:text-emerald-300';
                    if (item.category.includes('Overweight')) badgeColor = 'bg-amber-100 text-amber-800 dark:bg-amber-900/50 dark:text-amber-300';
                    if (item.category.includes('Obese')) badgeColor = 'bg-rose-100 text-rose-800 dark:bg-rose-900/50 dark:text-rose-300';

                    const entry = document.createElement('div');
                    entry.className = "flex items-center justify-between p-2.5 rounded-lg bg-slate-50 dark:bg-slate-700/30 border border-slate-100 dark:border-slate-700 text-xs";
                    entry.innerHTML = `
                        <div class="flex items-center gap-2">
                            <span class="font-black text-slate-700 dark:text-white">${item.bmi}</span>
                            <span class="px-2 py-0.5 rounded-md text-[10px] font-bold ${badgeColor}">${item.category}</span>
                        </div>
                        <span class="text-slate-400 dark:text-slate-500 font-medium">${item.date}</span>
                    `;
                    historyList.appendChild(entry);
                });
                clearHistoryBtn.classList.remove('hidden');
            };

            historyToggleBtn.addEventListener('click', () => {
                const isOpen = !historyContent.classList.contains('hidden');
                if (isOpen) {
                    historyContent.classList.add('hidden');
                    historyChevron.classList.remove('rotate-180');
                } else {
                    renderHistoryLog();
                    historyContent.classList.remove('hidden');
                    historyChevron.classList.add('rotate-180');
                }
            });

            clearHistoryBtn.addEventListener('click', () => {
                historyLog = [];
                localStorage.removeItem('bmi_history');
                renderHistoryLog();
            });

            resetBtn.addEventListener('click', () => {
                bmiForm.reset();
                ['height', 'weight', 'heightFt', 'heightIn', 'weightLbs'].forEach(id => {
                    const el = document.getElementById(id);
                    if(el) applyInputStyle(el, 'default');
                });
                clearValidationErrors();
                resetResultToGreenBox();
            });
        });
    </script>
</body>

</html>
